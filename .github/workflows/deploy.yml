# Auto-deploy to Cloudflare on merge to main — gated on the test suite.
#
# Flow: install → typecheck → test → (only if green) deploy the Worker, then the
# Pages dashboard. A red build never reaches production.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN   — a scoped token (see SETUP below)
#   CLOUDFLARE_ACCOUNT_ID  — your Cloudflare account id
#
# SETUP (one-time, owner only):
#   1. Cloudflare dashboard → My Profile → API Tokens → Create Token.
#      Use the "Edit Cloudflare Workers" template, then ADD permissions:
#        - Account · Workers Scripts · Edit
#        - Account · Cloudflare Pages · Edit
#        - Account · D1 · Edit            (only if CI ever runs migrations)
#      Scope it to the account + the shipaso.com zone. Copy the token.
#   2. Cloudflare dashboard → account home → copy the Account ID (right sidebar).
#   3. Add both as the repo secrets named above.
#   The workflow stays inert until those secrets exist.

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual runs from the Actions tab

# One deploy at a time; a newer push supersedes an in-flight one.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    # issues:write is for the failure alert below — a broken deploy on main used
    # to fail silently (10 merges shipped nowhere before anyone noticed).
    permissions:
      contents: read
      issues: write
    defaults:
      run:
        working-directory: cloud
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloud/package-lock.json

      - name: Install
        run: npm ci

      # ── quality gate: a failure here stops the deploy ──
      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Install Playwright browser
        run: ./node_modules/.bin/playwright install --with-deps chromium

      - name: E2E (dashboard funnel vs mock backend)
        # Serial + 1 retry: a few specs (the picker "Show more" pagination) race
        # the result-list re-render under Playwright's default parallelism + the
        # shared :8793 static server, detaching the button mid-click. They pass
        # deterministically serially — this matches the local pre-push gate
        # (.githooks/pre-push also runs --workers=1). The retry absorbs any
        # residual one-off flake without masking a real failure.
        run: ./node_modules/.bin/playwright test --workers=1 --retries=1

      # ── deploy gate: only deploy when the Cloudflare secrets are configured.
      # Keeps the workflow green (gates still run) before one-time secret setup,
      # instead of failing loudly on a missing CLOUDFLARE_API_TOKEN.
      - name: Check deploy credentials
        id: creds
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CF_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CLOUDFLARE_API_TOKEN not set — skipping deploy. Add CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID repo secrets to enable auto-deploy (see .github/workflows/deploy.yml header)."
          fi

      # ── deploy the Worker (API at api.shipaso.com) ──
      - name: Deploy Worker
        if: steps.creds.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloud
          command: deploy

      # ── build the dashboard with content-hashed assets (cache-busting, #40) ──
      # Stamps public/ → dist/ with name.<hash>.ext filenames + a rewritten
      # index.html, so each deploy invalidates the client bundle. A stale cached
      # app.js once made a preview audit the WRONG app; hashed names fix it at the
      # source. public/ stays un-hashed for local dev + Playwright E2E.
      - name: Build dashboard (cache-bust assets)
        if: steps.creds.outputs.configured == 'true'
        run: npm run build:dashboard

      # ── deploy the dashboard (Pages at app.shipaso.com) ──
      - name: Deploy Pages dashboard
        if: steps.creds.outputs.configured == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: cloud
          command: pages deploy dist --project-name store-ops-dashboard --branch main

      # ── failure alert: a red deploy on main must be LOUD ──
      # Opens (or comments on) a pinned-by-title issue so a broken deploy can't
      # fail silently across merges (the 2026-07-04 token episode: 10 merges
      # deployed nothing before anyone noticed). Uses the run's own token.
      - name: Alert on deploy failure (open/update issue)
        if: failure()
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TITLE="deploy to production is failing"
          BODY="Deploy run failed: $RUN_URL (commit ${GITHUB_SHA:0:7}).

          Merges to main are NOT reaching production until this is fixed. Check the run log — historically this is the Cloudflare API token (the header of .github/workflows/deploy.yml documents the permissions it needs: Workers Scripts Edit, Cloudflare Pages Edit, D1 Edit, zone Workers Routes Edit)."
          NUM=$(gh issue list --repo "$GITHUB_REPOSITORY" --state open --search "in:title \"$TITLE\"" --json number --jq '.[0].number // empty' || true)
          if [ -n "$NUM" ]; then
            gh issue comment "$NUM" --repo "$GITHUB_REPOSITORY" --body "$BODY"
          else
            gh issue create --repo "$GITHUB_REPOSITORY" --title "🚨 $TITLE" --body "$BODY"
          fi
