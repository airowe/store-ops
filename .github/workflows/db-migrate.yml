# Manual D1 migration runner — applies PENDING schema changes to the REMOTE
# production database, idempotently, using the same repo secrets as deploy.yml.
#
# Why this exists: schema.sql's CREATE TABLE IF NOT EXISTS statements apply via
# `npm run db:migrate`, but column ADDITIONS live as documented ALTERs (SQLite
# can't conditionally add columns in SQL alone). This workflow closes that gap:
# it reads PRAGMA table_info and adds ONLY the missing columns, so re-running is
# always safe. Trigger from the Actions tab (workflow_dispatch) after merging a
# schema change — ideally BEFORE the Worker deploy that references it.
#
# Never destructive: only ADD COLUMN + CREATE TABLE/INDEX IF NOT EXISTS. It
# cannot drop or rewrite anything.

name: db-migrate

on:
  workflow_dispatch: {}

concurrency:
  group: db-migrate-prod
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cloud/package-lock.json

      - name: Install
        run: npm ci

      - name: Check credentials
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CF_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN not set — cannot migrate."
            exit 1
          fi

      - name: Apply pending migrations (idempotent)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          d1() { npx wrangler d1 execute store_ops --remote --json --command "$1"; }

          # Diagnostics OUTSIDE command substitution so a wrangler failure is
          # visible in the log instead of being swallowed by $(...).
          echo "── wrangler auth check ──"
          npx wrangler whoami || true
          echo "── probe: can we reach the DB? ──"
          npx wrangler d1 execute store_ops --remote --json --command "SELECT 1" || {
            echo "::error::wrangler d1 execute failed — see output above (likely the API token lacks Account · D1 · Edit, or the DB name/binding differs)"
            exit 1
          }

          echo "── current users columns ──"
          COLS_JSON="$(d1 'PRAGMA table_info(users)')"
          COLS="$(echo "$COLS_JSON" | node -e '
            let s = "";
            process.stdin.on("data", (c) => (s += c));
            process.stdin.on("end", () => {
              const out = JSON.parse(s);
              const rows = out[0]?.results ?? [];
              console.log(rows.map((r) => r.name).join(" "));
            });
          ')"
          echo "users columns: $COLS"

          add_col_if_missing() {
            local col="$1"; local ddl="$2"
            if echo " $COLS " | grep -q " $col "; then
              echo "✓ users.$col already present — skipping"
            else
              echo "→ adding users.$col"
              d1 "ALTER TABLE users ADD COLUMN $ddl" > /dev/null
              echo "✓ added users.$col"
            fi
          }

          # Guarded column additions (every documented users ALTER — no-ops when present).
          add_col_if_missing agent_paused   "agent_paused INTEGER NOT NULL DEFAULT 0"
          add_col_if_missing rlhf_opt_out   "rlhf_opt_out INTEGER NOT NULL DEFAULT 0"
          add_col_if_missing rank_cadence   "rank_cadence TEXT NOT NULL DEFAULT 'weekly' CHECK (rank_cadence IN ('daily','weekly'))"
          add_col_if_missing email_digest   "email_digest TEXT NOT NULL DEFAULT 'weekly' CHECK (email_digest IN ('weekly','off'))"
          add_col_if_missing push_run_ready "push_run_ready INTEGER NOT NULL DEFAULT 1"

          # Idempotent table/index creation (device_tokens — mobile push, #127).
          d1 "CREATE TABLE IF NOT EXISTS device_tokens (token TEXT PRIMARY KEY, user_id TEXT NOT NULL REFERENCES users(id) ON DELETE CASCADE, platform TEXT NOT NULL DEFAULT 'ios', created_at TEXT NOT NULL DEFAULT (datetime('now')))" > /dev/null
          d1 "CREATE INDEX IF NOT EXISTS idx_device_tokens_user ON device_tokens(user_id)" > /dev/null
          echo "✓ device_tokens table + index ensured"

          # app_competitors (#72 — competitor watch list: discovery + confirm).
          d1 "CREATE TABLE IF NOT EXISTS app_competitors (app_id TEXT NOT NULL REFERENCES apps(id) ON DELETE CASCADE, comp_key TEXT NOT NULL, name TEXT NOT NULL DEFAULT '', source TEXT NOT NULL DEFAULT 'user' CHECK (source IN ('user','discovered')), status TEXT NOT NULL DEFAULT 'confirmed' CHECK (status IN ('suggested','confirmed')), created_at TEXT NOT NULL DEFAULT (datetime('now')), PRIMARY KEY (app_id, comp_key))" > /dev/null
          d1 "CREATE INDEX IF NOT EXISTS idx_app_competitors ON app_competitors(app_id, status)" > /dev/null
          echo "✓ app_competitors table + index ensured"

          # app_settings (#53 — per-app run-threshold config, fail-open JSON).
          d1 "CREATE TABLE IF NOT EXISTS app_settings (app_id TEXT PRIMARY KEY REFERENCES apps(id) ON DELETE CASCADE, threshold_json TEXT NOT NULL DEFAULT '{}')" > /dev/null
          echo "✓ app_settings table ensured"

          # app_settings columns (#52 — sweep schedule + last-sweep stamp).
          SETTINGS_COLS="$(d1 'PRAGMA table_info(app_settings)' | node -e '
            let s = "";
            process.stdin.on("data", (c) => (s += c));
            process.stdin.on("end", () => {
              const rows = JSON.parse(s)[0]?.results ?? [];
              console.log(rows.map((r) => r.name).join(" "));
            });
          ')"
          add_settings_col_if_missing() {
            local col="$1"; local ddl="$2"
            if echo " $SETTINGS_COLS " | grep -q " $col "; then
              echo "✓ app_settings.$col already present — skipping"
            else
              echo "→ adding app_settings.$col"
              d1 "ALTER TABLE app_settings ADD COLUMN $ddl" > /dev/null
              echo "✓ added app_settings.$col"
            fi
          }
          add_settings_col_if_missing schedule_json "schedule_json TEXT"
          add_settings_col_if_missing last_sweep_at "last_sweep_at TEXT"

          # stored_credentials (#67 — opt-in envelope-encrypted store credentials).
          # Fresh DBs get the widened CHECK (incl. 'asa' for #78-2 Search Ads keys).
          d1 "CREATE TABLE IF NOT EXISTS stored_credentials (id TEXT PRIMARY KEY, user_id TEXT NOT NULL REFERENCES users(id) ON DELETE CASCADE, app_id TEXT REFERENCES apps(id) ON DELETE CASCADE, kind TEXT NOT NULL CHECK (kind IN ('asc','play','asa')), key_id TEXT NOT NULL DEFAULT '', issuer_id TEXT NOT NULL DEFAULT '', ciphertext TEXT NOT NULL, wrapped_dek TEXT NOT NULL, kek_version INTEGER NOT NULL, created_at TEXT NOT NULL DEFAULT (datetime('now')), last_used_at TEXT, UNIQUE (user_id, app_id, kind))" > /dev/null
          d1 "CREATE INDEX IF NOT EXISTS idx_stored_cred_user ON stored_credentials(user_id)" > /dev/null
          echo "✓ stored_credentials table + index ensured"

          # #78-2: widen the kind CHECK on an EXISTING table to allow 'asa'.
          # SQLite can't ALTER a CHECK in place → rebuild, but only when needed
          # (idempotent: skip if the current schema already allows 'asa').
          NEEDS_ASA=$(npx wrangler d1 execute store_ops --remote --json --command "SELECT sql FROM sqlite_master WHERE type='table' AND name='stored_credentials'" | node -e '
            let s=""; process.stdin.on("data",c=>s+=c); process.stdin.on("end",()=>{
              const sql = (JSON.parse(s)[0]?.results?.[0]?.sql) || "";
              process.stdout.write(sql.includes("'"'"'asa'"'"'") ? "no" : "yes");
            });')
          if [ "$NEEDS_ASA" = "yes" ]; then
            echo "→ widening stored_credentials.kind CHECK to include 'asa' (table rebuild)"
            d1 "PRAGMA foreign_keys=OFF" > /dev/null
            d1 "CREATE TABLE stored_credentials_new (id TEXT PRIMARY KEY, user_id TEXT NOT NULL REFERENCES users(id) ON DELETE CASCADE, app_id TEXT REFERENCES apps(id) ON DELETE CASCADE, kind TEXT NOT NULL CHECK (kind IN ('asc','play','asa')), key_id TEXT NOT NULL DEFAULT '', issuer_id TEXT NOT NULL DEFAULT '', ciphertext TEXT NOT NULL, wrapped_dek TEXT NOT NULL, kek_version INTEGER NOT NULL, created_at TEXT NOT NULL DEFAULT (datetime('now')), last_used_at TEXT, UNIQUE (user_id, app_id, kind))" > /dev/null
            d1 "INSERT INTO stored_credentials_new SELECT id, user_id, app_id, kind, key_id, issuer_id, ciphertext, wrapped_dek, kek_version, created_at, last_used_at FROM stored_credentials" > /dev/null
            d1 "DROP TABLE stored_credentials" > /dev/null
            d1 "ALTER TABLE stored_credentials_new RENAME TO stored_credentials" > /dev/null
            d1 "CREATE INDEX IF NOT EXISTS idx_stored_cred_user ON stored_credentials(user_id)" > /dev/null
            d1 "PRAGMA foreign_keys=ON" > /dev/null
            echo "✓ stored_credentials.kind now allows 'asa'"
          else
            echo "✓ stored_credentials.kind already allows 'asa'"
          fi

      - name: Verify
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          echo "── users columns after migration ──"
          npx wrangler d1 execute store_ops --remote --json --command 'PRAGMA table_info(users)' | node -e '
            let s = "";
            process.stdin.on("data", (c) => (s += c));
            process.stdin.on("end", () => {
              const rows = JSON.parse(s)[0]?.results ?? [];
              for (const r of rows) console.log(`  ${r.name} (${r.type})`);
              const need = ["email_digest", "push_run_ready"];
              const have = new Set(rows.map((r) => r.name));
              const missing = need.filter((n) => !have.has(n));
              if (missing.length) { console.error("MISSING: " + missing.join(", ")); process.exit(1); }
              console.log("✓ all comms-prefs columns present");
            });
          '
          echo "── tables ──"
          npx wrangler d1 execute store_ops --remote --json --command "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name" | node -e '
            let s = "";
            process.stdin.on("data", (c) => (s += c));
            process.stdin.on("end", () => {
              const rows = JSON.parse(s)[0]?.results ?? [];
              console.log(rows.map((r) => r.name).join(", "));
              if (!rows.some((r) => r.name === "device_tokens")) { console.error("MISSING device_tokens"); process.exit(1); }
              console.log("✓ device_tokens present");
              if (!rows.some((r) => r.name === "app_competitors")) { console.error("MISSING app_competitors"); process.exit(1); }
              console.log("✓ app_competitors present");
              if (!rows.some((r) => r.name === "app_settings")) { console.error("MISSING app_settings"); process.exit(1); }
              console.log("✓ app_settings present");
              if (!rows.some((r) => r.name === "stored_credentials")) { console.error("MISSING stored_credentials"); process.exit(1); }
              console.log("✓ stored_credentials present");
            });
          '
