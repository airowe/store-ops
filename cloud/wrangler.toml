# wrangler.toml — store-ops Cloudflare Worker (API + agent engine + weekly cron)
#
# This is the BACKEND (Worker). The dashboard frontend ships separately to
# Cloudflare Pages (see "Pages" note at the bottom + README).
#
# Quick start:
#   1) npm install
#   2) npx wrangler d1 create store_ops        # creates the DB, prints a database_id
#   3) paste that id into `database_id` below   # <-- FILL ME IN
#   4) npm run db:migrate:local                 # apply schema.sql to the local DB
#   5) npm run dev                              # wrangler dev (local Worker + D1)
#   6) npm run db:migrate && npm run deploy     # remote DB + deploy

name = "store-ops"
main = "src/index.ts"
compatibility_date = "2025-01-01"
# nodejs_compat gives us node: built-ins if the ported engine ever needs them.
compatibility_flags = ["nodejs_compat"]

# ── D1 (SQLite) — bound as env.DB in the Worker ──────────────────────────────
[[d1_databases]]
binding = "DB"                 # code reads it as `env.DB`
database_name = "store_ops"
# database_id: FILL ME IN — run `npx wrangler d1 create store_ops` and paste the
# printed id here. Until then `wrangler dev` works against the LOCAL D1 only.
database_id = "30f6f8cf-90a5-4646-936f-8899ec4f62f6"

# ── Cron Trigger — the weekly autonomy loop ──────────────────────────────────
# "0 9 * * 1" = every Monday at 09:00 UTC. The scheduled() handler in
# src/cron/ re-checks ranks, watches competitors, and re-drafts past threshold.
[triggers]
crons = ["0 9 * * 1"]

# ── Vars (non-secret config) ─────────────────────────────────────────────────
[vars]
DEFAULT_COUNTRY = "US"
# APP_ENV drives env-specific auth/billing behavior. In "demo" the X-User-Email
# header is accepted (alongside real session cookies) and SESSION_SECRET may be
# unset (an insecure dev fallback is used, with a warning). Set APP_ENV to
# anything else (e.g. "production") to REQUIRE SESSION_SECRET and DISABLE the
# X-User-Email fallback — only signed session cookies authenticate.
APP_ENV = "demo"
# DASHBOARD_ORIGIN — the Pages dashboard origin, echoed on CORS responses (must
# be a concrete origin, not "*", because cookies are sent with credentials) and
# used to build the post-login redirect. Optional: falls back to the request
# Origin when unset.
# DASHBOARD_ORIGIN = "https://store-ops-dashboard.pages.dev"

# ── Secrets (DO NOT put values here — set via `wrangler secret put NAME`) ─────
# Auth:
#   SESSION_SECRET        — HMAC key signing magic-link + session tokens.
#                           REQUIRED outside demo (demo uses a dev fallback).
# Billing (Stripe, test mode):
#   STRIPE_TEST_KEY       — Stripe secret key (Bearer for the REST API).
#   STRIPE_WEBHOOK_SECRET — verifies the Stripe-Signature on /billing/webhook.
#   STRIPE_PRICE_LAUNCH   — Price id for Launch Optimization ($49 one-time).
#   STRIPE_PRICE_AUTOPILOT— Price id for Autopilot ($19/mo).
#   STRIPE_PRICE_FLEET    — Price id for Fleet Autopilot ($149/mo).
# Egress:
#   TINYFISH_API_KEY      — routes iTunes calls through TinyFish Fetch (clean egress).
#     REQUIRED in production: Apple 403s iTunes /search from Cloudflare egress IPs.
#     Unset → engine uses direct fetch (fine locally, blocked when deployed).
#
#   npx wrangler secret put SESSION_SECRET
#   npx wrangler secret put STRIPE_TEST_KEY
#   npx wrangler secret put STRIPE_WEBHOOK_SECRET
#   npx wrangler secret put STRIPE_PRICE_LAUNCH
#   npx wrangler secret put STRIPE_PRICE_AUTOPILOT
#   npx wrangler secret put STRIPE_PRICE_FLEET
#   npx wrangler secret put TINYFISH_API_KEY
# (The STRIPE_PRICE_* are not really secret — you may instead put them in [vars].)

# ── Pages (dashboard frontend) — NOT configured by this file ─────────────────
# The /public dir is a static dashboard deployed to Cloudflare Pages separately:
#   npx wrangler pages deploy public --project-name store-ops-dashboard
# Point the dashboard at this Worker's URL (set API_BASE in the dashboard, see
# README). Keeping Pages + Worker separate is the standard Cloudflare split:
# Worker = API/engine/cron, Pages = static dashboard.
