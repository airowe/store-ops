# wrangler.toml — store-ops Cloudflare Worker (API + agent engine + weekly cron)
#
# This is the BACKEND (Worker). The dashboard frontend ships separately to
# Cloudflare Pages (see "Pages" note at the bottom + README).
#
# Quick start:
#   1) npm install
#   2) npx wrangler d1 create store_ops        # creates the DB, prints a database_id
#   3) paste that id into `database_id` below   # <-- FILL ME IN
#   4) npm run db:migrate:local                 # apply schema.sql to the local DB
#   5) npm run dev                              # wrangler dev (local Worker + D1)
#   6) npm run db:migrate && npm run deploy     # remote DB + deploy

name = "store-ops"
main = "src/index.ts"
compatibility_date = "2025-01-01"
# nodejs_compat gives us node: built-ins if the ported engine ever needs them.
compatibility_flags = ["nodejs_compat"]

# ── Custom domain — the API on-brand at api.shipaso.com ──────────────────────
# `custom_domain = true` makes `wrangler deploy` provision the DNS record + cert
# on the shipaso.com zone automatically. The workers.dev URL stays live too, so
# the dashboard's existing API_BASE keeps working during the cutover.
[[routes]]
pattern = "api.shipaso.com"
custom_domain = true

# ── D1 (SQLite) — bound as env.DB in the Worker ──────────────────────────────
[[d1_databases]]
binding = "DB"                 # code reads it as `env.DB`
database_name = "store_ops"
# database_id: FILL ME IN — run `npx wrangler d1 create store_ops` and paste the
# printed id here. Until then `wrangler dev` works against the LOCAL D1 only.
database_id = "30f6f8cf-90a5-4646-936f-8899ec4f62f6"

# ── Cron Triggers — two schedules, dispatched in scheduled() on event.cron ───
# "0 9 * * 1" = every Monday 09:00 UTC → the WEEKLY autonomous sweep (unchanged):
#   re-checks ranks, watches competitors, re-drafts past threshold (prepares only).
# "0 8 * * *" = daily 08:00 UTC → the lightweight DAILY rank SNAPSHOT (#94): for
#   apps whose owner set rank_cadence='daily' it records a dated rank_snapshots row
#   and NOTHING else — no proposals, no approval runs, no push. Two triggers fit
#   Cloudflare's per-Worker cron budget (max 5). src/index.ts branches on the cron
#   expression so the daily trigger NEVER runs the weekly sweep and vice-versa.
[triggers]
crons = ["0 9 * * 1", "0 8 * * *"]

# ── Workers AI — bound as env.AI (#57) ───────────────────────────────────────
# Powers the keyword-reasoning step (engine/keywordReasoner.ts): the run path
# asks a small instruct model to classify title tokens + suggest description-
# derived target keywords, then guardrails the output against the listing text.
# OPTIONAL at runtime: if the binding is absent (e.g. local dev without AI), the
# run derives keywords with the deterministic classifier instead — a missing
# binding never breaks a run.
#
# ENABLED: the LLM reasons over the app's description to propose grounded intent
# keywords for ANY app (including ones whose name doesn't describe what they do).
# Safety: every model error degrades to the deterministic classifier (run never
# breaks), and the guardrails (no invention — targets must be substantiated by
# the description/keyword field; rank-checked before shown) keep it honest. The
# real ASC keyword field still takes precedence (#75) — the LLM enriches, it
# doesn't override the user's own curated keywords.
[ai]
binding = "AI"

# ── Vars (non-secret config) ─────────────────────────────────────────────────
[vars]
DEFAULT_COUNTRY = "US"
# APP_ENV drives env-specific auth/billing behavior. In "demo" the X-User-Email
# header is accepted (alongside real session cookies) and SESSION_SECRET may be
# unset (an insecure dev fallback is used, with a warning). Set APP_ENV to
# anything else (e.g. "production") to REQUIRE SESSION_SECRET and DISABLE the
# X-User-Email fallback — only signed session cookies authenticate.
APP_ENV = "production"
# DASHBOARD_ORIGIN — the canonical dashboard origin. Echoed on CORS responses
# (must be a concrete origin, not "*", because cookies are sent with credentials)
# AND used to build the post-login + Stripe redirect targets, so the browser
# lands on the dashboard (not the bare Worker) after the magic link / checkout.
DASHBOARD_ORIGIN = "https://app.shipaso.com"
# COOKIE_DOMAIN — shares the session cookie across the dashboard (app.shipaso.com)
# and API (api.shipaso.com) subdomains, with SameSite=None so it rides cross-site
# fetches. Leave unset for single-origin / local dev (→ host-only, SameSite=Lax).
COOKIE_DOMAIN = ".shipaso.com"

# ── Secrets (DO NOT put values here — set via `wrangler secret put NAME`) ─────
# Auth:
#   SESSION_SECRET        — HMAC key signing magic-link + session tokens.
#                           REQUIRED outside demo (demo uses a dev fallback).
# Billing (Stripe):
#   STRIPE_SECRET_KEY     — Stripe secret key (Bearer for the REST API), test OR
#                           live. (Legacy STRIPE_TEST_KEY is still read as a
#                           fallback during migration; prefer the new name.)
#   STRIPE_WEBHOOK_SECRET — verifies the Stripe-Signature on /billing/webhook.
#   STRIPE_PRICE_INDIE    — Price id for Indie ($7/mo subscription).
#   STRIPE_PRICE_STARTUP  — Price id for Startup ($19/mo subscription).
#   STRIPE_PRICE_SCALE    — Price id for Scale ($65/mo subscription).
# Egress:
#   TINYFISH_API_KEY      — routes iTunes calls through TinyFish Fetch (clean egress).
#     REQUIRED in production: Apple 403s iTunes /search from Cloudflare egress IPs.
#     Unset → engine uses direct fetch (fine locally, blocked when deployed).
# Email (magic-link delivery):
#   RESEND_API_KEY        — Resend API key. With it (+ RESEND_FROM) /auth/request
#                           emails the magic link; unset → link is logged only.
#   RESEND_FROM           — verified Resend sender, e.g.
#                           "store-ops <login@mail.yourdomain.com>". Set as a [vars]
#                           entry (not secret) or a secret — either works.
#
#   npx wrangler secret put SESSION_SECRET
#   npx wrangler secret put STRIPE_SECRET_KEY
#   npx wrangler secret put STRIPE_WEBHOOK_SECRET
#   npx wrangler secret put STRIPE_PRICE_INDIE
#   npx wrangler secret put STRIPE_PRICE_STARTUP
#   npx wrangler secret put STRIPE_PRICE_SCALE
#   npx wrangler secret put TINYFISH_API_KEY
#   npx wrangler secret put RESEND_API_KEY
#   npx wrangler secret put RESEND_FROM   # (or add to [vars])
# (The STRIPE_PRICE_* are not really secret — you may instead put them in [vars].)

# ── Pages (dashboard frontend) — NOT configured by this file ─────────────────
# The /public dir is a static dashboard deployed to Cloudflare Pages separately:
#   npx wrangler pages deploy public --project-name store-ops-dashboard
# Point the dashboard at this Worker's URL (set API_BASE in the dashboard, see
# README). Keeping Pages + Worker separate is the standard Cloudflare split:
# Worker = API/engine/cron, Pages = static dashboard.
