<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Signing you in · ShipASO</title>
  <!-- API base (window.STORE_OPS.API_BASE), same config the dashboard uses. -->
  <script src="/config.js"></script>
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: #07090e; color: #eef1f7;
      font: 15px/1.55 -apple-system, "Segoe UI", Roboto, sans-serif;
    }
    .card {
      max-width: 420px; margin: 0 18px; padding: 28px;
      background: #11151f; border: 1px solid #222a3b; border-radius: 14px; text-align: center;
    }
    h1 { font-size: 20px; margin: 0 0 6px; }
    p { color: #97a1b6; margin: 6px 0 18px; }
    a.btn {
      display: inline-block; padding: 12px 18px; border-radius: 12px;
      background: #34d399; color: #07090e; font-weight: 700; text-decoration: none;
    }
    a.link { color: #34d399; text-decoration: none; font-size: 13px; }
    .err { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">Signing you in…</h1>
    <p id="msg">If the ShipASO app is installed, it should open automatically.</p>
    <p><a class="btn" id="openApp" href="#">Open the app</a></p>
    <p><a class="link" id="continueWeb" href="#">Continue in the browser instead</a></p>
  </div>
  <script>
    (function () {
      // Read the magic-link token WITHOUT trusting it as HTML (URL-encode only).
      var token = new URLSearchParams(location.search).get("token") || "";
      var title = document.getElementById("title");
      var msg = document.getElementById("msg");

      if (!token) {
        title.textContent = "This link is incomplete";
        title.className = "err";
        msg.textContent = "Request a fresh sign-in link and try again.";
        document.getElementById("openApp").style.display = "none";
        document.getElementById("continueWeb").style.display = "none";
        return;
      }

      var api = (window.STORE_OPS && window.STORE_OPS.API_BASE) || "";
      // Web fallback: exchange the magic link for a session COOKIE via the worker.
      var webUrl = api.replace(/\/+$/, "") + "/auth/callback?token=" + encodeURIComponent(token);
      // App deep link (custom-scheme fallback for when the universal link didn't
      // hand off — e.g. opened in an in-app browser).
      var appUrl = "shipaso://auth/m?token=" + encodeURIComponent(token);

      document.getElementById("openApp").setAttribute("href", appUrl);
      var cont = document.getElementById("continueWeb");
      cont.setAttribute("href", webUrl);

      // Best-effort: nudge the app open, then let the user pick either path. We do
      // NOT auto-redirect to the web flow (that would consume the magic link before
      // the app could), so a device with the app installed keeps its handoff.
      try { window.location.href = appUrl; } catch (e) {}
    })();
  </script>
</body>
</html>
