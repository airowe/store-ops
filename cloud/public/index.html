<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark light" />
    <!-- Apply the saved theme BEFORE the stylesheet paints, so a light-mode user
         never sees a dark flash on load. No explicit choice → the CSS follows the
         OS via prefers-color-scheme. Kept tiny + inline on purpose. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("store-ops:theme");
          if (t === "light" || t === "dark") document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <title>ShipASO · autonomous ASO agent</title>
    <meta name="description" content="An AI-native autonomous App Store Optimization agent. It audits, ranks on real data, drafts optimized copy, and prepares the store push — you approve the one irreversible step." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b0e14'/%3E%3Cg fill='%2334d399'%3E%3Cpath d='M16 6 L8.5 17 h15 Z'/%3E%3Cpath d='M5.5 19 h21 l-3 5 H8.5 Z'/%3E%3C/g%3E%3Cline x1='16' y1='8' x2='16' y2='17' stroke='%230b0e14' stroke-width='1.5'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-in">
        <div class="logo" id="logo" title="ShipASO">
          <span class="tick"><svg viewBox="0 0 24 24" fill="none"><g fill="#34d399"><path d="M12 4 L6.5 12.5 h11 Z"/><path d="M4 14.5 h16 l-2.2 4 H6.2 Z"/></g></svg></span>
          <span>ShipASO <small>autonomous ASO</small></span>
        </div>
        <div class="spacer"></div>
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle light / dark theme" title="Toggle light / dark theme">
          <svg class="i-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="i-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
        </button>
        <div class="who">
          <span class="faint">acting as</span>
          <input id="emailInput" type="email" spellcheck="false" title="Stubbed auth — sent as the X-User-Email header on every API call" />
          <span class="env-pill" id="envpill">demo backend</span>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div id="view"></div>
    </main>

    <div class="toast" id="toast"></div>

    <!-- SPA freshness nudge (#54): shown only when a newer app.<hash>.js has
         deployed while this tab was open. Non-blocking, dismissible, never
         auto-reloads. Populated + toggled (.show) by app.js. -->
    <div class="freshness-banner" id="freshness" role="status" aria-live="polite"></div>

    <!-- config first (sets window.STORE_OPS), then the demo backend, then the app -->
    <script src="config.js"></script>
    <script src="mock.js"></script>
    <script src="app.js"></script>
  </body>
</html>
