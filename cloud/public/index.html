<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="dark" />
    <title>ShipASO · autonomous ASO agent</title>
    <meta name="description" content="An AI-native autonomous App Store Optimization agent. It audits, ranks on real data, drafts optimized copy, and prepares the store push — you approve the one irreversible step." />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230b0e14'/%3E%3Cpath d='M9 17l4 4 10-11' stroke='%2334d399' stroke-width='3' fill='none' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-in">
        <div class="logo" id="logo" title="ShipASO">
          <span class="tick"><svg viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4 10-12" stroke="#34d399" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span>ShipASO <small>autonomous ASO</small></span>
        </div>
        <div class="spacer"></div>
        <div class="who">
          <span class="faint">acting as</span>
          <input id="emailInput" type="email" spellcheck="false" title="Stubbed auth — sent as the X-User-Email header on every API call" />
          <span class="env-pill" id="envpill">demo backend</span>
        </div>
      </div>
    </header>

    <main class="wrap">
      <div id="view"></div>
    </main>

    <div class="toast" id="toast"></div>

    <!-- config first (sets window.STORE_OPS), then the demo backend, then the app -->
    <script src="config.js"></script>
    <script src="mock.js"></script>
    <script src="app.js"></script>
  </body>
</html>
